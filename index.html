<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>palace - Cozy Paddy Field Survival</title>
    <style>
        :root {
            --palace-red: #9E3640;     /* Core Brand Red */
            --bg-cream: #fbf8f0;       /* Cozy Soft Cream */
            --dark-charcoal: #1a1a1a;  /* Clean Dark */
            --gold: #e2b13c;           /* Golden Rice */
            --paddy-green: #a4c28e;    /* Soft Paddy Green */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-cream);
            color: var(--dark-charcoal);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 10px;
            overflow: hidden;
        }

        .game-wrapper {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--dark-charcoal);
            padding-bottom: 8px;
        }

        .game-title {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--palace-red);
            text-shadow: 1.5px 1.5px 0px var(--dark-charcoal);
        }

        .status-pill {
            font-size: 0.8rem;
            font-weight: 800;
            background: #ffffff;
            border: 2px solid var(--dark-charcoal);
            padding: 4px 8px;
            box-shadow: 2px 2px 0px var(--dark-charcoal);
            text-transform: uppercase;
        }

        .arena-container {
            position: relative;
            border: 3px solid var(--dark-charcoal);
            box-shadow: 6px 6px 0px var(--dark-charcoal);
            background: #e1ecc8;
            overflow: hidden;
            aspect-ratio: 16/9;
            width: 100%;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        .hud-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none;
        }

        .bar-container {
            width: 160px;
            height: 16px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid var(--dark-charcoal);
            position: relative;
        }

        .bar-fill {
            height: 100%;
            width: 100%;
            background: var(--palace-red);
            transition: width 0.1s ease;
        }

        .hud-resources {
            display: flex;
            gap: 8px;
            pointer-events: auto;
        }

        .resource-badge {
            background: #ffffff;
            border: 2px solid var(--dark-charcoal);
            padding: 2px 6px;
            font-size: 0.75rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .crafting-section {
            background: #ffffff;
            border: 3px solid var(--dark-charcoal);
            padding: 12px;
            box-shadow: 4px 4px 0px var(--dark-charcoal);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .section-title {
            font-size: 0.85rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--dark-charcoal);
            border-bottom: 2px dashed #ccc;
            padding-bottom: 4px;
        }

        .craft-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 8px;
        }

        .craft-card {
            border: 2px solid var(--dark-charcoal);
            padding: 8px;
            background: var(--bg-cream);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 4px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .craft-card:hover {
            background: #fff;
            transform: translateY(-2px);
        }

        .craft-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            background: #f0f0f0;
        }

        .craft-name {
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .craft-cost {
            font-size: 0.65rem;
            font-weight: 700;
            color: #666;
        }

        .controls-tip {
            text-align: center;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #888;
        }

        .death-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 26, 26, 0.95);
            color: #ffffff;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 100;
        }

        .death-title {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--palace-red);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .btn-restart {
            background: var(--palace-red);
            color: #fff;
            border: 3px solid #ffffff;
            padding: 8px 16px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="game-header">
        <div class="game-title">palace</div>
        <div class="status-pill" id="time-display">Time: 00:00</div>
    </div>

    <div class="arena-container">
        <canvas id="gameCanvas"></canvas>
        
        <div class="hud-overlay">
            <div style="font-size: 0.75rem; font-weight: 900; color: var(--dark-charcoal);">HEALTH</div>
            <div class="bar-container">
                <div class="bar-fill" id="hp-bar"></div>
            </div>
            
            <div class="hud-resources">
                <div class="resource-badge">🌾 Rice Straw: <span id="wood-count">0</span></div>
                <div class="resource-badge">🪨 River Stone: <span id="stone-count">0</span></div>
                <div class="resource-badge">⭐ Golden Soul: <span id="soul-count">0</span></div>
            </div>
        </div>

        <div class="death-screen" id="death-screen">
            <div class="death-title">DEFEATED</div>
            <div style="font-weight: 700; text-transform: uppercase;">Your journey across the paddy fields has ended.</div>
            <button class="btn-restart" onclick="restartGame()">Try Again</button>
        </div>
    </div>

    <div class="crafting-section">
        <div class="section-title">Paddy Field Crafting Bench (Choose Your Path)</div>
        <div class="craft-grid" id="craft-grid"></div>
    </div>

    <div class="controls-tip">
        Move: WASD or Arrow Keys | auto-attacks unlocked items!
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = 800;
    canvas.height = 450;

    let player, keys, resources, gameObjects, projectiles, enemies, particles, paddyDebris;
    let secondsElapsed, gameInterval, lastTime;
    let isGameOver = false;

    const craftCatalog = [
        { id: 'sword', name: 'Palace Sword 🗡️', cost: { wood: 4, stone: 1 }, unlocked: false, desc: 'Sweeps enemies nearby' },
        { id: 'staff', name: 'Bordeaux Staff 🔮', cost: { wood: 8, stone: 4 }, unlocked: false, desc: 'Auto shoots homing fireballs' },
        { id: 'bow', name: 'Royal Bow 🏹', cost: { wood: 6, stone: 8 }, unlocked: false, desc: 'Piercing rapid-fire arrows' }
    ];

    class Player {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.size = 14;
            this.speed = 2.6;
            this.hp = 100;
            this.maxHp = 100;
            this.weapons = { sword: false, staff: false, bow: false };
            this.lastAttackTimes = { sword: 0, staff: 0, bow: 0 };
            this.walkCycle = 0;
            this.isMoving = false;
        }

        draw() {
            let time = Date.now();
            let wave = Math.sin(time * 0.01) * 2;
            let legOffset = this.isMoving ? Math.sin(this.walkCycle) * 4 : 0;

            // Draw soft shadow
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.beginPath();
            ctx.ellipse(this.x, this.y + 14, 12, 5, 0, 0, Math.PI * 2);
            ctx.fill();

            // 1. Smooth Flowing Cape/Scarf (#9E3640)
            ctx.fillStyle = '#9E3640';
            ctx.beginPath();
            ctx.moveTo(this.x - 8, this.y - 2);
            // Dynamic wave for the cape tail
            let capeWave = Math.sin(time * 0.008) * 6;
            ctx.bezierCurveTo(
                this.x - 14 - (this.isMoving ? 6 : 0), this.y + 4 + capeWave,
                this.x - 18 - (this.isMoving ? 8 : 0), this.y + 12 + capeWave,
                this.x - 8, this.y + 16
            );
            ctx.closePath();
            ctx.fill();

            // 2. Main Body (Cute minimalist farmer clothes)
            ctx.fillStyle = '#2c3e50';
            ctx.fillRect(this.x - 7, this.y - 12, 14, 22);

            // 3. Cute Straw Hat (หมวกสาน)
            ctx.fillStyle = '#e5c158'; // Straw yellow
            ctx.beginPath();
            ctx.moveTo(this.x - 14, this.y - 10);
            ctx.quadraticCurveTo(this.x, this.y - 22 + wave * 0.5, this.x + 14, this.y - 10);
            ctx.closePath();
            ctx.fill();
            
            // Hat band detail
            ctx.fillStyle = '#9E3640';
            ctx.fillRect(this.x - 11, this.y - 12, 22, 2);

            // 4. Little Cute Face
            ctx.fillStyle = '#f9d5bb';
            ctx.fillRect(this.x - 5, this.y - 10, 10, 6);
            // Cute eyes
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(this.x - 3, this.y - 8, 2, 2);
            ctx.fillRect(this.x + 1, this.y - 8, 2, 2);

            // 5. Active legs (Smooth running motion)
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(this.x - 5, this.y + 10 + legOffset, 3, 4);
            ctx.fillRect(this.x + 2, this.y + 10 - legOffset, 3, 4);
        }

        update() {
            let dx = 0;
            let dy = 0;
            this.isMoving = false;

            if (keys['w'] || keys['ArrowUp']) { dy = -this.speed; this.isMoving = true; }
            if (keys['s'] || keys['ArrowDown']) { dy = this.speed; this.isMoving = true; }
            if (keys['a'] || keys['ArrowLeft']) { dx = -this.speed; this.isMoving = true; }
            if (keys['d'] || keys['ArrowRight']) { dx = this.speed; this.isMoving = true; }

            if (this.isMoving) {
                this.walkCycle += 0.25;
            }

            this.x = Math.max(20, Math.min(canvas.width - 20, this.x + dx));
            this.y = Math.max(20, Math.min(canvas.height - 20, this.y + dy));

            // Auto Attack triggers
            let now = Date.now();
            if (this.weapons.sword && now - this.lastAttackTimes.sword > 750) {
                this.triggerSword();
                this.lastAttackTimes.sword = now;
            }
            if (this.weapons.staff && now - this.lastAttackTimes.staff > 1100) {
                this.triggerStaff();
                this.lastAttackTimes.staff = now;
            }
            if (this.weapons.bow && now - this.lastAttackTimes.bow > 500) {
                this.triggerBow();
                this.lastAttackTimes.bow = now;
            }
        }

        triggerSword() {
            createParticleExplosion(this.x, this.y, '#9E3640', 8);
            enemies.forEach(enemy => {
                let dist = Math.hypot(enemy.x - this.x, enemy.y - this.y);
                if (dist < 80) {
                    enemy.damage(40);
                    createParticleExplosion(enemy.x, enemy.y, '#9E3640', 4);
                }
            });
            projectiles.push({
                type: 'slash',
                x: this.x, y: this.y, radius: 75, duration: 8, timer: 0
            });
        }

        triggerStaff() {
            let target = getClosestEnemy(this.x, this.y);
            if (!target) return;
            
            projectiles.push({
                type: 'fireball',
                x: this.x, y: this.y,
                vx: 0, vy: 0,
                target: target,
                speed: 5.0,
                color: '#9E3640',
                size: 7
            });
        }

        triggerBow() {
            let target = getClosestEnemy(this.x, this.y);
            if (!target) return;

            let angle = Math.atan2(target.y - this.y, target.x - this.x);
            projectiles.push({
                type: 'arrow',
                x: this.x, y: this.y,
                vx: Math.cos(angle) * 8.5,
                vy: Math.sin(angle) * 8.5,
                size: 4
            });
        }
    }

    // Cozy Resource Gatherable objects (Paddy theme)
    class ResourceNode {
        constructor(x, y, type) {
            this.x = x;
            this.y = y;
            this.type = type; // 'straw' or 'stone'
            this.hp = 3;
            this.size = 14;
            this.shake = 0;
        }

        draw() {
            let wind = Math.sin(Date.now() * 0.005 + this.x * 0.05) * 3;
            let shakeX = Math.sin(this.shake) * 4;
            if (this.shake > 0) this.shake -= 0.2;

            if (this.type === 'straw') {
                // Cute golden rice straw pile (กองฟาง)
                ctx.fillStyle = '#e9c46a';
                ctx.beginPath();
                ctx.moveTo(this.x - 12 + shakeX, this.y + 10);
                ctx.quadraticCurveTo(this.x + wind, this.y - 12, this.x + 12 + shakeX, this.y + 10);
                ctx.closePath();
                ctx.fill();

                // Tied ribbon decoration
                ctx.fillStyle = '#e76f51';
                ctx.fillRect(this.x - 8 + shakeX, this.y + 2, 16, 2);
            } else {
                // Smooth river stone
                ctx.fillStyle = '#83c5be';
                ctx.beginPath();
                ctx.arc(this.x + shakeX, this.y + 6, 11, 0, Math.PI, true);
                ctx.closePath();
                ctx.fill();
            }
        }

        harvest() {
            this.hp--;
            this.shake = 5;
            createParticleExplosion(this.x, this.y, this.type === 'straw' ? '#e9c46a' : '#83c5be', 5);
            if (this.hp <= 0) {
                if (this.type === 'straw') resources.wood += 2;
                if (this.type === 'stone') resources.stone += 2;
                updateResourceHUD();
                return true; 
            }
            return false;
        }
    }

    // Cute Monsters (Bouncing Animations)
    class Enemy {
        constructor(x, y, type = 'normal') {
            this.x = x;
            this.y = y;
            this.type = type; // 'normal' (Cute Slime), 'sprout' (Rice sprout), 'boss' (Giant Fluffy Chick)
            this.speed = type === 'normal' ? 1.0 : (type === 'sprout' ? 1.4 : 0.6);
            this.hp = type === 'normal' ? 35 : (type === 'sprout' ? 25 : 220);
            this.size = type === 'normal' ? 12 : (type === 'sprout' ? 10 : 26);
            this.bounceCycle = Math.random() * 10;
        }

        draw() {
            this.bounceCycle += 0.15;
            let bounce = Math.abs(Math.sin(this.bounceCycle)) * 6;
            let stretchX = 1 + (Math.sin(this.bounceCycle) * 0.15);
            let stretchY = 1 - (Math.sin(this.bounceCycle) * 0.15);

            if (this.type === 'normal') {
                // 1. Cute Strawberry Slime (แก้มแดง ดุ๊กดิ๊ก)
                ctx.fillStyle = '#e76f51';
                ctx.beginPath();
                ctx.ellipse(this.x, this.y + 6 - bounce, this.size * stretchX, this.size * stretchY, 0, 0, Math.PI * 2);
                ctx.fill();

                // Eyes
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(this.x - 4, this.y + 3 - bounce, 2, 2);
                ctx.fillRect(this.x + 2, this.y + 3 - bounce, 2, 2);

                // Cute Blush (แก้มชมพู)
                ctx.fillStyle = '#ffb5a7';
                ctx.beginPath();
                ctx.arc(this.x - 6, this.y + 6 - bounce, 2, 0, Math.PI * 2);
                ctx.arc(this.x + 6, this.y + 6 - bounce, 2, 0, Math.PI * 2);
                ctx.fill();

            } else if (this.type === 'sprout') {
                // 2. Little Sprout Spirit (ภูตต้นกล้า ดุ๊กดิ๊ก)
                ctx.fillStyle = '#52b788';
                ctx.beginPath();
                ctx.arc(this.x, this.y + 8 - bounce, this.size, 0, Math.PI * 2);
                ctx.fill();

                // Two tiny green leaves on top
                ctx.fillStyle = '#74c69d';
                ctx.beginPath();
                ctx.ellipse(this.x - 4, this.y - bounce, 5, 2, -Math.PI/4, 0, Math.PI*2);
                ctx.ellipse(this.x + 4, this.y - bounce, 5, 2, Math.PI/4, 0, Math.PI*2);
                ctx.fill();

                // Little black dot eyes
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(this.x - 3, this.y + 6 - bounce, 1.5, 1.5);
                ctx.fillRect(this.x + 1, this.y + 6 - bounce, 1.5, 1.5);

            } else if (this.type === 'boss') {
                // 3. Giant Fluffy Chick (บอสลูกเจี๊ยบยักษ์นุ่มฟู)
                ctx.fillStyle = '#f4a261'; // Fluffy soft yellow-orange
                ctx.beginPath();
                ctx.arc(this.x, this.y - bounce, this.size, 0, Math.PI * 2);
                ctx.fill();

                // Big cute blushing cheeks
                ctx.fillStyle = '#e76f51';
                ctx.beginPath();
                ctx.arc(this.x - 14, this.y + 2 - bounce, 5, 0, Math.PI*2);
                ctx.arc(this.x + 14, this.y + 2 - bounce, 5, 0, Math.PI*2);
                ctx.fill();

                // Big black eyes
                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath();
                ctx.arc(this.x - 8, this.y - 4 - bounce, 3, 0, Math.PI*2);
                ctx.arc(this.x + 8, this.y - 4 - bounce, 3, 0, Math.PI*2);
                ctx.fill();

                // Cute Orange Beak (ปากจิ๋วสีส้ม)
                ctx.fillStyle = '#e76f51';
                ctx.beginPath();
                ctx.moveTo(this.x - 4, this.y - 1 - bounce);
                ctx.lineTo(this.x + 4, this.y - 1 - bounce);
                ctx.lineTo(this.x, this.y + 5 - bounce);
                ctx.closePath();
                ctx.fill();
            }
        }

        update() {
            let angle = Math.atan2(player.y - this.y, player.x - this.x);
            this.x += Math.cos(angle) * this.speed;
            this.y += Math.sin(angle) * this.speed;

            let dist = Math.hypot(player.x - this.x, player.y - this.y);
            if (dist < this.size + player.size) {
                player.hp -= this.type === 'boss' ? 0.9 : 0.25;
                document.getElementById('hp-bar').style.width = `${Math.max(0, player.hp)}%`;
                if (player.hp <= 0) {
                    gameOver();
                }
            }
        }

        damage(amount) {
            this.hp -= amount;
            createParticleExplosion(this.x, this.y, '#e5383b', 4);
            if (this.hp <= 0) {
                if (this.type === 'boss') {
                    resources.souls += 1;
                } else {
                    if (Math.random() > 0.7) resources.wood += 1;
                    else if (Math.random() > 0.8) resources.stone += 1;
                }
                updateResourceHUD();
            }
        }
    }

    function getClosestEnemy(x, y) {
        if (enemies.length === 0) return null;
        let closest = null;
        let minDist = Infinity;
        enemies.forEach(enemy => {
            let dist = Math.hypot(enemy.x - x, enemy.y - y);
            if (dist < minDist) {
                minDist = dist;
                closest = enemy;
            }
        });
        return closest;
    }

    function createParticleExplosion(x, y, color, count) {
        for (let i = 0; i < count; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 5,
                vy: (Math.random() - 0.5) * 5,
                color: color,
                alpha: 1,
                life: 25
            });
        }
    }

    // Cozy details: swaying grasses in the fields
    function initPaddyField() {
        paddyDebris = [];
        for (let i = 0; i < 40; i++) {
            paddyDebris.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 3 + 2,
                phase: Math.random() * 100
            });
        }
    }

    function init() {
        player = new Player(canvas.width / 2, canvas.height / 2);
        keys = {};
        resources = { wood: 0, stone: 0, souls: 0 };
        gameObjects = [];
        projectiles = [];
        enemies = [];
        particles = [];
        secondsElapsed = 0;
        isGameOver = false;

        document.getElementById('death-screen').style.display = 'none';
        document.getElementById('hp-bar').style.width = '100%';

        craftCatalog.forEach(c => c.unlocked = false);
        player.weapons = { sword: false, staff: false, bow: false };

        // Generate cozy harvestables
        for (let i = 0; i < 14; i++) spawnNode('straw');
        for (let i = 0; i < 8; i++) spawnNode('stone');

        initPaddyField();
        updateResourceHUD();
        renderCraftGrid();

        lastTime = Date.now();
        if (gameInterval) clearInterval(gameInterval);
        gameInterval = setInterval(gameLoop, 1000 / 60);
    }

    function spawnNode(type) {
        let x = Math.random() * (canvas.width - 60) + 30;
        let y = Math.random() * (canvas.height - 60) + 30;
        gameObjects.push(new ResourceNode(x, y, type));
    }

    window.addEventListener('keydown', e => keys[e.key] = true);
    window.addEventListener('keyup', e => keys[e.key] = false);

    function updateResourceHUD() {
        document.getElementById('wood-count').innerText = resources.wood;
        document.getElementById('stone-count').innerText = resources.stone;
        document.getElementById('soul-count').innerText = resources.souls;
        renderCraftGrid();
    }

    function renderCraftGrid() {
        const grid = document.getElementById('craft-grid');
        grid.innerHTML = '';

        craftCatalog.forEach(item => {
            const canAfford = resources.wood >= item.cost.wood && resources.stone >= item.cost.stone;
            const card = document.createElement('div');
            card.className = `craft-card ${(!canAfford && !item.unlocked) ? 'disabled' : ''}`;
            
            let statusText = item.unlocked ? 
                `<span style="color:var(--gold); font-weight:900;">ACTIVE ✓</span>` : 
                `<span class="craft-cost">🌾${item.cost.wood}  🪨${item.cost.stone}</span>`;

            card.innerHTML = `
                <div class="craft-name">${item.name}</div>
                <div style="font-size:0.65rem; color:#888;">${item.desc}</div>
                <div>${statusText}</div>
            `;

            if (!item.unlocked && canAfford) {
                card.onclick = () => craftItem(item);
            }
            grid.appendChild(card);
        });
    }

    function craftItem(item) {
        resources.wood -= item.cost.wood;
        resources.stone -= item.cost.stone;
        item.unlocked = true;
        player.weapons[item.id] = true;
        updateResourceHUD();
        createParticleExplosion(player.x, player.y, '#e2b13c', 15);
    }

    function gameLoop() {
        update();
        draw();
    }

    function update() {
        if (isGameOver) return;

        player.update();

        let now = Date.now();
        if (now - lastTime >= 1000) {
            secondsElapsed++;
            lastTime = now;
            
            let mins = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
            let secs = (secondsElapsed % 60).toString().padStart(2, '0');
            document.getElementById('time-display').innerText = `Time: ${mins}:${secs}`;

            if (secondsElapsed % 6 === 0 && gameObjects.length < 24) {
                spawnNode(Math.random() > 0.4 ? 'straw' : 'stone');
            }

            if (secondsElapsed % 4 === 0) {
                spawnEnemyWave();
            }
        }

        // Projectiles Loop
        for (let i = projectiles.length - 1; i >= 0; i--) {
            let p = projectiles[i];
            
            if (p.type === 'slash') {
                p.timer++;
                if (p.timer > p.duration) projectiles.splice(i, 1);
            } else if (p.type === 'fireball') {
                if (enemies.includes(p.target)) {
                    let angle = Math.atan2(p.target.y - p.y, p.target.x - p.x);
                    p.vx = Math.cos(angle) * p.speed;
                    p.vy = Math.sin(angle) * p.speed;
                } else {
                    let nextTarget = getClosestEnemy(p.x, p.y);
                    if (nextTarget) p.target = nextTarget;
                }
                p.x += p.vx;
                p.y += p.vy;

                enemies.forEach((enemy) => {
                    if (Math.hypot(enemy.x - p.x, enemy.y - p.y) < enemy.size + p.size) {
                        enemy.damage(28);
                        projectiles.splice(i, 1);
                    }
                });
            } else if (p.type === 'arrow') {
                p.x += p.vx;
                p.y += p.vy;

                enemies.forEach((enemy) => {
                    if (Math.hypot(enemy.x - p.x, enemy.y - p.y) < enemy.size + p.size) {
                        enemy.damage(18);
                    }
                });

                if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) {
                    projectiles.splice(i, 1);
                }
            }
        }

        gameObjects.forEach((obj, idx) => {
            let dist = Math.hypot(player.x - obj.x, player.y - obj.y);
            if (dist < player.size + obj.size + 4) {
                let removed = obj.harvest();
                if (removed) gameObjects.splice(idx, 1);
            }
        });

        for (let i = enemies.length - 1; i >= 0; i--) {
            enemies[i].update();
            if (enemies[i].hp <= 0) {
                enemies.splice(i, 1);
            }
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            let part = particles[i];
            part.x += part.vx;
            part.y += part.vy;
            part.life--;
            if (part.life <= 0) particles.splice(i, 1);
        }
    }

    function spawnEnemyWave() {
        let spawnCount = Math.floor(secondsElapsed / 15) + 3;
        for (let i = 0; i < spawnCount; i++) {
            let side = Math.floor(Math.random() * 4);
            let ex, ey;
            if (side === 0) { ex = -10; ey = Math.random() * canvas.height; }
            else if (side === 1) { ex = canvas.width + 10; ey = Math.random() * canvas.height; }
            else if (side === 2) { ex = Math.random() * canvas.width; ey = -10; }
            else { ex = Math.random() * canvas.width; ey = canvas.height + 10; }

            // Boss Spawns after 40 seconds
            if (secondsElapsed > 40 && Math.random() > 0.8) {
                enemies.push(new Enemy(ex, ey, 'boss'));
            } else {
                enemies.push(new Enemy(ex, ey, Math.random() > 0.5 ? 'normal' : 'sprout'));
            }
        }
    }

    function draw() {
        // Soft Grass-Green background
        ctx.fillStyle = '#cfdbb2';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw Fields Divider lines (คันนาสีดินนุ่มๆ)
        ctx.strokeStyle = '#c4cca1';
        ctx.lineWidth = 6;
        ctx.beginPath();
        // Drawing custom cozy grid plots
        for(let i=200; i<canvas.width; i+=300) {
            ctx.moveTo(i, 0); ctx.lineTo(i-40, canvas.height);
        }
        for(let j=150; j<canvas.height; j+=150) {
            ctx.moveTo(0, j); ctx.lineTo(canvas.width, j+20);
        }
        ctx.stroke();

        // Draw Swaying field grasses (ดีเทลต้นข้าวพริ้วไหว)
        let time = Date.now();
        paddyDebris.forEach(grass => {
            let wind = Math.sin(time * 0.003 + grass.phase) * 5;
            ctx.fillStyle = '#a4c28e';
            ctx.beginPath();
            ctx.moveTo(grass.x, grass.y);
            ctx.quadraticCurveTo(grass.x + wind, grass.y - 12, grass.x + 8, grass.y);
            ctx.closePath();
            ctx.fill();

            // Golden tip of rice
            ctx.fillStyle = '#e9c46a';
            ctx.beginPath();
            ctx.arc(grass.x + wind*0.6 + 4, grass.y - 10, 2, 0, Math.PI*2);
            ctx.fill();
        });

        // Draw elements in layers
        gameObjects.forEach(obj => obj.draw());
        enemies.forEach(enemy => enemy.draw());
        player.draw();

        // Projectiles rendering
        projectiles.forEach(p => {
            if (p.type === 'slash') {
                ctx.strokeStyle = 'rgba(158, 54, 64, 0.45)';
                ctx.lineWidth = 12;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.stroke();
            } else if (p.type === 'fireball') {
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            } else if (p.type === 'arrow') {
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
            }
        });

        // Particles
        particles.forEach(p => {
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
        });
    }

    function gameOver() {
        isGameOver = true;
        clearInterval(gameInterval);
        document.getElementById('death-screen').style.display = 'flex';
    }

    window.restartGame = function() {
        init();
    }

    init();
</script>
